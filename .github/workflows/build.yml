name: Build Qubes

permissions:
  contents: write

on:
  # Manual trigger with version input
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: ''
      create_release:
        description: 'Create a GitHub release'
        type: boolean
        default: false

  # Auto-build on tags
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ========== Create Release First ==========
  create-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Get version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Qubes ${{ steps.version.outputs.tag }}
          body: |
            ## Qubes - Sovereign AI Agents

            Everything included out of the box: Kokoro TTS (54 voices), semantic search, and Ollama for local LLM.

            ### Downloads
            - **Windows**: `Qubes-Windows.zip` - Windows 10/11 64-bit
            - **macOS (Apple Silicon)**: `Qubes-macOS-ARM.zip` - M1/M2/M3/M4 Macs
            - **Linux**: `Qubes-Linux.zip` - Ubuntu/Debian/Fedora

            ### Installation
            1. Download and extract the ZIP for your platform
            2. **Windows**: Double-click `Qubes.exe`
            3. **macOS**: Double-click `Qubes.app` (right-click → Open if blocked)
            4. **Linux**: Run `./install.sh` then `./launch.sh`

            ### Requirements
            - 16 GB RAM minimum (32 GB recommended for local LLM)
            - Internet connection for initial Ollama model download
            - NVIDIA GPU optional (improves TTS performance)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== Build ==========
  build:
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: Qubes-Windows
            ollama_url: https://github.com/ollama/ollama/releases/download/v0.4.7/ollama-windows-amd64.zip
            ollama_ext: zip
            node_url: https://nodejs.org/dist/v20.18.3/node-v20.18.3-win-x64.zip
            exe_ext: .exe

          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: Qubes-macOS-ARM
            ollama_url: https://github.com/ollama/ollama/releases/download/v0.4.7/ollama-darwin
            ollama_ext: binary
            node_url: https://nodejs.org/dist/v20.18.3/node-v20.18.3-darwin-arm64.tar.gz
            exe_ext: ''

          # Intel Mac removed - macos-13 is retired and macos-13-large requires paid plan
          # Most Macs today are Apple Silicon (M1/M2/M3)

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: Qubes-Linux
            ollama_url: https://github.com/ollama/ollama/releases/download/v0.4.7/ollama-linux-amd64.tgz
            ollama_ext: tgz
            node_url: https://nodejs.org/dist/v20.18.3/node-v20.18.3-linux-x64.tar.gz
            exe_ext: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ========== Free Disk Space (needed for heavy deps + models) ==========
      - name: Free disk space (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean || true
          echo "Free space: $(df -h / | tail -1 | awk '{print $4}')"

      - name: Free disk space (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "C:\hostedtoolcache\*" -ErrorAction SilentlyContinue
          Write-Host "Free space: $((Get-PSDrive C).Free / 1GB) GB"

      # ========== System Dependencies ==========
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            portaudio19-dev \
            python3-dev \
            libffi-dev \
            ffmpeg

      - name: Install macOS dependencies
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install portaudio ffmpeg

      # ========== Setup Rust ==========
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: qubes-gui/src-tauri -> target

      # ========== Setup Node.js ==========
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: qubes-gui/package-lock.json

      # ========== Setup Python ==========
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install CPU-only PyTorch (Linux/Windows)
        if: "!startsWith(matrix.platform, 'macos')"
        shell: bash
        run: |
          # CPU torch keeps PyInstaller bundle under 2GB GitHub release limit
          # GPU inference (LLM) runs through bundled Ollama, not Python's torch
          # Kokoro TTS 82M and sentence-transformers run fine on CPU
          python -m pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-heavy.txt

      # ========== Build Python Backend (--onedir for full bundle) ==========
      - name: Build Python backend (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd qubes-gui/src-tauri
          New-Item -ItemType Directory -Force -Path binaries
          pyinstaller qubes-backend-heavy.spec --noconfirm
          # --onedir output: dist/qubes-backend/qubes-backend.exe + dist/qubes-backend/_internal/
          # Create dummy sidecar for Tauri build check
          "#!/bin/sh" | Out-File -Encoding ASCII "binaries/qubes-backend-${{ matrix.target }}.exe"

      - name: Build Python backend (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cd qubes-gui/src-tauri
          mkdir -p binaries
          pyinstaller qubes-backend-heavy.spec --noconfirm
          # --onedir output: dist/qubes-backend/qubes-backend + dist/qubes-backend/_internal/
          # Create dummy sidecar for Tauri build check
          echo '#!/bin/sh' > "binaries/qubes-backend-${{ matrix.target }}"
          chmod +x "binaries/qubes-backend-${{ matrix.target }}"

      # ========== Strip PyInstaller Bundle Bloat ==========
      # Removes ~500-800MB of torch/transformers files not needed for inference
      - name: Strip bundle bloat (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          INTERNAL="qubes-gui/src-tauri/dist/qubes-backend/_internal"
          echo "Backend size before strip: $(du -sh "qubes-gui/src-tauri/dist/qubes-backend" | cut -f1)"
          # Torch: remove test binaries, compiler, training, distributed (~300-500MB)
          rm -rf "$INTERNAL/torch/test" \
                 "$INTERNAL/torch/_inductor" \
                 "$INTERNAL/torch/_dynamo" \
                 "$INTERNAL/torch/_functorch" \
                 "$INTERNAL/torch/_export" \
                 "$INTERNAL/torch/distributed" \
                 "$INTERNAL/torch/ao" \
                 "$INTERNAL/torch/profiler" \
                 "$INTERNAL/torch/onnx" \
                 "$INTERNAL/torch/optim" \
                 "$INTERNAL/torch/include" \
                 "$INTERNAL/torch/share" \
                 "$INTERNAL/torch/contrib" \
                 "$INTERNAL/torch/autograd/profiler"* \
                 "$INTERNAL/torch/package" 2>/dev/null || true
          # Torch C++ headers and static libs (not needed at runtime)
          find "$INTERNAL" -name "*.a" -delete 2>/dev/null || true
          find "$INTERNAL" -name "*.h" -path "*/torch/*" -delete 2>/dev/null || true
          # Transformers: remove unused model implementations (~100MB)
          rm -rf "$INTERNAL/transformers/testing_utils"* \
                 "$INTERNAL/transformers/models/deprecated" 2>/dev/null || true
          # Numpy: remove build artifacts that confuse numpy's source directory detection
          rm -f "$INTERNAL/numpy/setup.py" "$INTERNAL/numpy/pyproject.toml" 2>/dev/null || true
          rm -rf "$INTERNAL/numpy/distutils" "$INTERNAL/numpy/f2py" 2>/dev/null || true
          # Numpy: ensure numpy.libs/ (OpenBLAS, gfortran) is present — required by _multiarray_umath.so
          # PyInstaller may place these in _internal/ root; copy to numpy.libs/ if missing
          if [ ! -d "$INTERNAL/numpy.libs" ] || [ -z "$(ls -A "$INTERNAL/numpy.libs" 2>/dev/null)" ]; then
            echo "WARNING: numpy.libs/ missing or empty in bundle, copying from site-packages..."
            NUMPY_LIBS=$(python -c "import numpy, os; print(os.path.join(os.path.dirname(os.path.dirname(numpy.__file__)), 'numpy.libs'))" 2>/dev/null)
            if [ -d "$NUMPY_LIBS" ]; then
              mkdir -p "$INTERNAL/numpy.libs"
              cp -v "$NUMPY_LIBS"/*.so* "$INTERNAL/numpy.libs/" 2>/dev/null || true
              echo "Copied numpy.libs from $NUMPY_LIBS"
            fi
          fi
          echo "numpy.libs contents: $(ls "$INTERNAL/numpy.libs/" 2>/dev/null || echo 'MISSING')"
          # Tkinter/Tcl/Tk (GUI toolkit - not needed in headless backend)
          rm -rf "$INTERNAL/test" "$INTERNAL/tests" \
                 "$INTERNAL/unittest" "$INTERNAL/tkinter" \
                 "$INTERNAL/_tkinter"* "$INTERNAL/_tk_data" \
                 "$INTERNAL/tcl"* "$INTERNAL/tk"* 2>/dev/null || true
          # Remove __pycache__ dirs and .pyc files (saves ~50MB)
          find "$INTERNAL" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find "$INTERNAL" -name "*.pyc" -delete 2>/dev/null || true
          # Strip debug symbols from .so files
          find "$INTERNAL" -name "*.so" -exec strip -S {} + 2>/dev/null || true
          # Torch stubs: replace deleted torch.distributed/futures/rpc with lightweight stubs
          # so TTS code that imports them doesn't crash
          echo "Installing torch stub modules..."
          for subdir in distributed futures rpc; do
            mkdir -p "$INTERNAL/torch/$subdir"
            cp "patches/torch/$subdir/__init__.py" "$INTERNAL/torch/$subdir/__init__.py"
            echo "  Installed torch.$subdir stub"
          done
          # Also patch torch.nn if the patch exists (fixes circular import)
          if [ -f "patches/torch/nn/__init__.py" ]; then
            cp "patches/torch/nn/__init__.py" "$INTERNAL/torch/nn/__init__.py"
            echo "  Installed torch.nn patch"
          fi
          echo "Backend size after strip: $(du -sh "qubes-gui/src-tauri/dist/qubes-backend" | cut -f1)"

      - name: Strip bundle bloat (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $internal = "qubes-gui/src-tauri/dist/qubes-backend/_internal"
          $sizeBefore = (Get-ChildItem -Recurse "qubes-gui/src-tauri/dist/qubes-backend" | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Backend size before strip: $([math]::Round($sizeBefore))MB"
          $dirs = @(
            "torch/test", "torch/_inductor", "torch/_dynamo", "torch/_functorch",
            "torch/_export", "torch/distributed", "torch/ao", "torch/profiler",
            "torch/onnx", "torch/optim", "torch/include", "torch/share",
            "torch/contrib", "torch/package",
            "transformers/testing_utils", "transformers/models/deprecated",
            "test", "tests", "unittest", "tkinter", "_tk_data", "tcl"
          )
          foreach ($d in $dirs) {
            $path = Join-Path $internal $d
            if (Test-Path $path) { Remove-Item -Recurse -Force $path }
          }
          # Numpy: remove build artifacts that confuse numpy's source directory detection
          Remove-Item -Force (Join-Path $internal "numpy/setup.py") -ErrorAction SilentlyContinue
          Remove-Item -Force (Join-Path $internal "numpy/pyproject.toml") -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force (Join-Path $internal "numpy/distutils") -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force (Join-Path $internal "numpy/f2py") -ErrorAction SilentlyContinue
          # Numpy: ensure numpy.libs/ (OpenBLAS DLLs) is present — required by _multiarray_umath
          $numpyLibs = Join-Path $internal "numpy.libs"
          if (-not (Test-Path $numpyLibs) -or (Get-ChildItem $numpyLibs -ErrorAction SilentlyContinue).Count -eq 0) {
            Write-Host "WARNING: numpy.libs/ missing or empty, copying from site-packages..."
            $numpySrc = python -c "import numpy, os; print(os.path.join(os.path.dirname(os.path.dirname(numpy.__file__)), 'numpy.libs'))"
            if (Test-Path $numpySrc) {
              New-Item -ItemType Directory -Force -Path $numpyLibs | Out-Null
              Copy-Item (Join-Path $numpySrc "*") $numpyLibs -Force
              Write-Host "Copied numpy.libs from $numpySrc"
            }
          }
          Write-Host "numpy.libs contents: $(Get-ChildItem $numpyLibs -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name)"
          # Remove __pycache__ and .pyc
          Get-ChildItem -Path $internal -Recurse -Directory -Filter "__pycache__" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          # Torch stubs: replace deleted torch.distributed/futures/rpc with lightweight stubs
          Write-Host "Installing torch stub modules..."
          foreach ($subdir in @("distributed", "futures", "rpc")) {
            $destDir = Join-Path $internal "torch/$subdir"
            New-Item -ItemType Directory -Force -Path $destDir | Out-Null
            Copy-Item "patches/torch/$subdir/__init__.py" (Join-Path $destDir "__init__.py") -Force
            Write-Host "  Installed torch.$subdir stub"
          }
          # Also patch torch.nn if the patch exists (fixes circular import)
          $nnPatch = "patches/torch/nn/__init__.py"
          if (Test-Path $nnPatch) {
            Copy-Item $nnPatch (Join-Path $internal "torch/nn/__init__.py") -Force
            Write-Host "  Installed torch.nn patch"
          }
          $sizeAfter = (Get-ChildItem -Recurse "qubes-gui/src-tauri/dist/qubes-backend" | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Backend size after strip: $([math]::Round($sizeAfter))MB (saved $([math]::Round($sizeBefore - $sizeAfter))MB)"

      # ========== Install Frontend Dependencies ==========
      - name: Install frontend dependencies
        working-directory: qubes-gui
        run: npm ci

      # ========== Install Covenant Dependencies ==========
      - name: Install covenant dependencies
        working-directory: covenant
        run: npm ci

      # ========== Build Tauri App ==========
      - name: Build Tauri app (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: qubes-gui
        shell: pwsh
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri app (Unix)
        if: matrix.platform != 'windows-latest'
        working-directory: qubes-gui
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ========== Download Ollama ==========
      - name: Download Ollama (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # The full Windows Ollama zip is ~1.8GB (includes CUDA DLLs for GPU inference).
          # Extract only ollama.exe (~200MB) to keep bundle under 2GB GitHub limit.
          # CPU LLM inference works out of the box; GPU libs can be downloaded on demand.
          New-Item -ItemType Directory -Force -Path ollama-temp
          Invoke-WebRequest -Uri "${{ matrix.ollama_url }}" -OutFile "ollama-temp/ollama.zip"
          New-Item -ItemType Directory -Force -Path "dist-bundle/ollama"
          # Extract just ollama.exe (and ollama_runners for CPU) from the zip
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("ollama-temp/ollama.zip")
          foreach ($entry in $zip.Entries) {
            # Include ollama.exe and cpu runner libs (skip cuda/rocm runners ~4GB)
            if ($entry.FullName -eq "ollama.exe" -or $entry.FullName -match "^lib/ollama/runners/cpu") {
              $destPath = Join-Path "dist-bundle/ollama" $entry.FullName
              $destDir = Split-Path $destPath -Parent
              if (!(Test-Path $destDir)) { New-Item -ItemType Directory -Force -Path $destDir | Out-Null }
              if (!$entry.FullName.EndsWith("/")) {
                [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, $destPath, $true)
              }
            }
          }
          $zip.Dispose()
          $size = (Get-ChildItem -Recurse "dist-bundle/ollama" | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Ollama extracted size: $([math]::Round($size))MB (exe + CPU runners only)"

      - name: Download Ollama (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p dist-bundle/ollama
          curl -L "${{ matrix.ollama_url }}" -o dist-bundle/ollama/ollama
          chmod +x dist-bundle/ollama/ollama

      - name: Download Ollama (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p ollama-temp dist-bundle/ollama
          curl -L "${{ matrix.ollama_url }}" -o ollama-temp/ollama.tgz
          tar -xzf ollama-temp/ollama.tgz -C ollama-temp
          cp -r ollama-temp/bin/* dist-bundle/ollama/ || cp ollama-temp/ollama dist-bundle/ollama/
          chmod +x dist-bundle/ollama/*

      # ========== Download Portable Node.js ==========
      # Bundled so covenant minting works without system Node.js
      - name: Download portable Node.js (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ matrix.node_url }}" -OutFile "node.zip"
          Expand-Archive "node.zip" -DestinationPath "node-temp"
          $nodeDir = Get-ChildItem "node-temp" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path "dist-bundle/node"
          Copy-Item "$($nodeDir.FullName)/node.exe" "dist-bundle/node/node.exe"

      - name: Download portable Node.js (macOS/Linux)
        if: matrix.platform != 'windows-latest'
        run: |
          curl -L "${{ matrix.node_url }}" -o node.tar.gz
          tar -xzf node.tar.gz
          NODE_DIR=$(ls -d node-v* | head -1)
          mkdir -p dist-bundle/node
          cp "$NODE_DIR/bin/node" dist-bundle/node/node
          chmod +x dist-bundle/node/node

      # ========== Download HuggingFace Models ==========
      - name: Download HuggingFace models
        shell: bash
        run: |
          mkdir -p dist-bundle/models/huggingface
          python -c "
          from huggingface_hub import snapshot_download
          import os
          hf_dir = os.path.join('dist-bundle', 'models', 'huggingface')
          os.environ['HF_HOME'] = hf_dir
          hub_dir = os.path.join(hf_dir, 'hub')
          print('Downloading Kokoro-82M...')
          snapshot_download('hexgrad/Kokoro-82M', cache_dir=hub_dir)
          print('Downloading all-MiniLM-L6-v2...')
          snapshot_download('sentence-transformers/all-MiniLM-L6-v2', cache_dir=hub_dir)
          print('Models downloaded.')
          "

      - name: Deduplicate HuggingFace models (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          echo "Models size before dedup: $(du -sh dist-bundle/models | cut -f1)"
          # HF snapshot_download creates blobs/ (real files) + snapshots/ (symlinks).
          # zip follows symlinks, storing every file twice. Resolve symlinks to real files.
          find dist-bundle/models -type l | while read link; do
            target=$(readlink -f "$link")
            if [ -f "$target" ]; then
              rm "$link"
              cp "$target" "$link"
            fi
          done
          # Remove blobs/ dirs (data now lives directly in snapshots/)
          find dist-bundle/models -type d -name "blobs" -exec rm -rf {} + 2>/dev/null || true
          echo "Models size after dedup: $(du -sh dist-bundle/models | cut -f1)"

      - name: Deduplicate HuggingFace models (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # On Windows, HF uses hardlinks — blobs/ and snapshots/ point to the same
          # underlying data. Compress-Archive stores hardlinks as separate files (doubles size).
          # Fix: break hardlinks by copying snapshot files to new real files, then delete blobs/.
          $before = (Get-ChildItem -Recurse "dist-bundle/models" -File | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Models size before dedup: $([math]::Round($before))MB"
          # Break hardlinks in snapshots/ by replacing each file with an independent copy
          Get-ChildItem -Path "dist-bundle/models" -Recurse -Directory -Filter "snapshots" | ForEach-Object {
            Get-ChildItem -Path $_.FullName -Recurse -File | ForEach-Object {
              $tmp = "$($_.FullName).tmp"
              Copy-Item $_.FullName $tmp
              Remove-Item $_.FullName
              Move-Item $tmp $_.FullName
            }
          }
          # Now safe to delete blobs/ — snapshots/ has independent copies
          Get-ChildItem -Path "dist-bundle/models" -Recurse -Directory -Filter "blobs" | Remove-Item -Recurse -Force
          $after = (Get-ChildItem -Recurse "dist-bundle/models" -File | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Models size after dedup: $([math]::Round($after))MB (saved $([math]::Round($before - $after))MB)"

      # ========== Create Distribution Bundle ==========
      - name: Create distribution bundle (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $distDir = "dist-bundle/Qubes"
          New-Item -ItemType Directory -Force -Path $distDir
          New-Item -ItemType Directory -Force -Path "$distDir/resources"

          # Copy Tauri executable
          Copy-Item "qubes-gui/src-tauri/target/${{ matrix.target }}/release/qubes-gui.exe" "$distDir/Qubes.exe"

          # Copy Python backend (--onedir output with all deps)
          Copy-Item "qubes-gui/src-tauri/dist/qubes-backend" "$distDir/qubes-backend" -Recurse

          # Copy CashScript covenant (tsx + TypeScript minting scripts)
          Copy-Item "covenant" "$distDir/covenant" -Recurse

          # Copy portable Node.js (for covenant tsx scripts)
          Copy-Item "dist-bundle/node" "$distDir/node" -Recurse

          # Copy Ollama
          Copy-Item "dist-bundle/ollama" "$distDir/ollama" -Recurse

          # Copy HuggingFace models (Kokoro TTS, sentence-transformers)
          if (Test-Path "dist-bundle/models") {
            Copy-Item "dist-bundle/models" "$distDir/models" -Recurse
          }

          # Copy resources
          if (Test-Path "qubes-gui/src-tauri/resources") {
            Copy-Item "qubes-gui/src-tauri/resources/*" "$distDir/resources/" -Recurse
          }

          # Create VERSION file for backend auto-updater
          $version = "${{ needs.create-release.outputs.tag }}" -replace '^v', ''
          if (-not $version) { $version = "0.0.0" }
          $version | Out-File "$distDir/qubes-backend/VERSION" -Encoding ASCII -NoNewline

          # Create config
          @"
          {
            "version": "1.0.0",
            "variant": "standard",
            "bundled_ollama": true
          }
          "@ | Out-File "$distDir/qubes-config.json" -Encoding UTF8

          # Create README
          @"
          Qubes - Sovereign AI Agents
          ===========================

          Everything included out of the box:
            - Kokoro TTS (local text-to-speech, 54 voices)
            - Semantic search (all-MiniLM-L6-v2 embeddings)
            - Ollama for local LLM chat (downloads model on first use)

          Getting Started:
          1. Double-click Qubes.exe to launch
          2. Follow the setup wizard to create your account
          3. Create your first Qube!

          Requirements:
          - Windows 10/11 64-bit
          - 16 GB RAM minimum (32 GB recommended for local LLM)
          - Internet connection for initial model download and cloud AI
          - NVIDIA GPU optional (improves TTS performance)

          Support: https://github.com/BitFaced2/Qubes
          "@ | Out-File "$distDir/README.txt" -Encoding UTF8

      - name: Create distribution bundle (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          DIST_DIR="dist-bundle/Qubes"
          mkdir -p "$DIST_DIR"

          # Copy Tauri app bundle
          cp -r "qubes-gui/src-tauri/target/${{ matrix.target }}/release/bundle/macos/Qubes.app" "$DIST_DIR/Qubes.app"

          # Put backend, ollama, models INSIDE .app so Rust exe_dir resolution works
          # exe_dir on macOS = Qubes.app/Contents/MacOS/
          APP_MACOS="$DIST_DIR/Qubes.app/Contents/MacOS"

          # Remove dummy sidecar files that Tauri embedded (we use --onedir instead)
          rm -f "$APP_MACOS"/qubes-backend* 2>/dev/null || true

          # Copy Python backend (--onedir output with all deps)
          cp -r "qubes-gui/src-tauri/dist/qubes-backend" "$APP_MACOS/qubes-backend"
          chmod +x "$APP_MACOS/qubes-backend/qubes-backend"

          # Create VERSION file for backend auto-updater
          VERSION="${{ needs.create-release.outputs.tag }}"
          VERSION="${VERSION#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0"
          printf '%s' "$VERSION" > "$APP_MACOS/qubes-backend/VERSION"

          # Copy CashScript covenant (tsx + TypeScript minting scripts)
          cp -r covenant "$APP_MACOS/covenant"

          # Copy portable Node.js (for covenant tsx scripts)
          cp -r dist-bundle/node "$APP_MACOS/node"

          # Copy Ollama
          mkdir -p "$APP_MACOS/ollama"
          cp -r dist-bundle/ollama/* "$APP_MACOS/ollama/"

          # Copy HuggingFace models (Kokoro TTS, sentence-transformers)
          if [ -d "dist-bundle/models" ]; then
            cp -r dist-bundle/models "$APP_MACOS/models"
          fi

          # Create config
          cat > "$DIST_DIR/qubes-config.json" << 'CEOF'
          {
            "version": "1.0.0",
            "variant": "standard",
            "bundled_ollama": true
          }
          CEOF

          # Create README
          cat > "$DIST_DIR/README.txt" << 'REOF'
          Qubes - Sovereign AI Agents
          ===========================

          Everything included out of the box:
            - Kokoro TTS (local text-to-speech, 54 voices)
            - Semantic search (all-MiniLM-L6-v2 embeddings)
            - Ollama for local LLM chat (downloads model on first use)

          Getting Started:
          1. Double-click Qubes.app to launch
          2. If blocked by Gatekeeper, right-click and select "Open"
          3. Follow the setup wizard to create your account
          4. Create your first Qube!

          Requirements:
          - macOS 12 (Monterey) or later, Apple Silicon
          - 16 GB RAM minimum (32 GB recommended for local LLM)
          - Internet connection for initial model download and cloud AI

          Support: https://github.com/BitFaced2/Qubes
          REOF

      - name: Create distribution bundle (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          DIST_DIR="dist-bundle/Qubes"
          mkdir -p "$DIST_DIR"/{resources,ollama}

          # Copy Tauri executable
          cp "qubes-gui/src-tauri/target/${{ matrix.target }}/release/qubes-gui" "$DIST_DIR/Qubes"
          chmod +x "$DIST_DIR/Qubes"

          # Copy Python backend (--onedir output with all deps)
          cp -r "qubes-gui/src-tauri/dist/qubes-backend" "$DIST_DIR/qubes-backend"
          chmod +x "$DIST_DIR/qubes-backend/qubes-backend"

          # Create VERSION file for backend auto-updater
          VERSION="${{ needs.create-release.outputs.tag }}"
          VERSION="${VERSION#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0"
          printf '%s' "$VERSION" > "$DIST_DIR/qubes-backend/VERSION"

          # Copy CashScript covenant (tsx + TypeScript minting scripts)
          cp -r covenant "$DIST_DIR/covenant"

          # Copy portable Node.js (for covenant tsx scripts)
          cp -r dist-bundle/node "$DIST_DIR/node"

          # Copy Ollama
          cp -r dist-bundle/ollama/* "$DIST_DIR/ollama/"

          # Copy HuggingFace models (Kokoro TTS, sentence-transformers)
          if [ -d "dist-bundle/models" ]; then
            cp -r dist-bundle/models "$DIST_DIR/models"
          fi

          # Copy resources
          if [ -d "qubes-gui/src-tauri/resources" ]; then
            cp -r qubes-gui/src-tauri/resources/* "$DIST_DIR/resources/"
          fi

          # Create config
          cat > "$DIST_DIR/qubes-config.json" << 'CEOF'
          {
            "version": "1.0.0",
            "variant": "standard",
            "bundled_ollama": true
          }
          CEOF

          # Create launcher script (sets env vars for bundled models + CUDA libs)
          cat > "$DIST_DIR/launch.sh" << 'LAUNCHER'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          # Point HuggingFace to bundled models
          if [ -d "$SCRIPT_DIR/models/huggingface" ]; then
            export HF_HOME="$SCRIPT_DIR/models/huggingface"
          fi

          # Point Ollama to bundled models
          if [ -d "$SCRIPT_DIR/models/ollama" ]; then
            export OLLAMA_MODELS="$SCRIPT_DIR/models/ollama"
          fi

          # Add bundled CUDA/NVIDIA libraries to LD_LIBRARY_PATH
          INTERNAL_DIR="$SCRIPT_DIR/qubes-backend/_internal"
          if [ -d "$INTERNAL_DIR" ]; then
            NVIDIA_PATHS=$(find "$INTERNAL_DIR" -path "*/nvidia/*/lib" -type d 2>/dev/null | tr '\n' ':')
            if [ -n "$NVIDIA_PATHS" ]; then
              export LD_LIBRARY_PATH="${NVIDIA_PATHS}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
            fi
            export LD_LIBRARY_PATH="$INTERNAL_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          fi

          exec "$SCRIPT_DIR/Qubes" "$@"
          LAUNCHER
          chmod +x "$DIST_DIR/launch.sh"

          # Create install script (desktop entry + optional PATH symlink)
          cat > "$DIST_DIR/install.sh" << 'INSTALLER'
          #!/bin/bash
          set -e
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          DESKTOP_FILE="$HOME/.local/share/applications/qubes.desktop"

          echo "=== Qubes Installation ==="
          echo "Location: $SCRIPT_DIR"
          echo ""

          mkdir -p "$HOME/.local/share/applications"
          cat > "$DESKTOP_FILE" << EOF
          [Desktop Entry]
          Name=Qubes
          Comment=Sovereign AI Agents
          Exec=$SCRIPT_DIR/launch.sh
          Icon=$SCRIPT_DIR/resources/icon.png
          Terminal=false
          Type=Application
          Categories=Utility;
          StartupWMClass=qubes
          EOF
          echo "Desktop entry created: $DESKTOP_FILE"

          read -p "Add 'qubes' command to PATH (~/.local/bin)? [y/N] " -n 1 -r
          echo
          if [[ $REPLY =~ ^[Yy]$ ]]; then
            mkdir -p "$HOME/.local/bin"
            ln -sf "$SCRIPT_DIR/launch.sh" "$HOME/.local/bin/qubes"
            echo "Symlink: ~/.local/bin/qubes"
          fi

          echo ""
          echo "Done! Launch from app menu or: $SCRIPT_DIR/launch.sh"
          INSTALLER
          chmod +x "$DIST_DIR/install.sh"

          # Copy icon for desktop entry
          if [ -f "qubes-gui/src-tauri/icons/128x128.png" ]; then
            cp "qubes-gui/src-tauri/icons/128x128.png" "$DIST_DIR/resources/icon.png"
          fi

          # Create README
          cat > "$DIST_DIR/README.txt" << 'REOF'
          Qubes - Sovereign AI Agents
          ===========================

          Everything included out of the box:
            - Kokoro TTS (local text-to-speech, 54 voices)
            - Semantic search (all-MiniLM-L6-v2 embeddings)
            - Ollama for local LLM chat (downloads model on first use)

          Getting Started:
          1. Extract: tar -xzf Qubes-Linux.tar.gz  (or unzip Qubes-Linux.zip)
          2. Install: cd Qubes && ./install.sh
          3. Launch: ./launch.sh

          Requirements:
          - Ubuntu 20.04+ / Debian 11+ / Fedora 35+
          - 16 GB RAM minimum (32 GB recommended for local LLM)
          - Internet connection for initial model download and cloud AI
          - NVIDIA GPU optional (improves TTS performance)

          Support: https://github.com/BitFaced2/Qubes
          REOF

      # ========== Check Bundle Size ==========
      - name: Check bundle size (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          echo "=== Bundle size breakdown ==="
          du -sh dist-bundle/Qubes/
          du -sh dist-bundle/Qubes/*/ 2>/dev/null || true
          if [ -d "dist-bundle/Qubes/qubes-backend/_internal" ]; then
            echo "=== Top 10 largest dirs in _internal ==="
            du -sh dist-bundle/Qubes/qubes-backend/_internal/*/ 2>/dev/null | sort -rh | head -10
          fi
          # Fail early if uncompressed size suggests ZIP will exceed 2GB
          SIZE_BYTES=$(du -sb dist-bundle/Qubes/ | cut -f1)
          SIZE_MB=$((SIZE_BYTES / 1048576))
          echo "Total uncompressed: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 4000 ]; then
            echo "::warning::Bundle is ${SIZE_MB}MB uncompressed - ZIP may exceed 2GB GitHub limit"
          fi

      - name: Check bundle size (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "=== Bundle size breakdown ==="
          Get-ChildItem "dist-bundle/Qubes" -Directory | ForEach-Object {
            $dirSize = (Get-ChildItem -Recurse $_.FullName | Measure-Object -Property Length -Sum).Sum / 1MB
            Write-Host "$($_.Name)/: $([math]::Round($dirSize))MB"
          }
          $size = (Get-ChildItem -Recurse "dist-bundle/Qubes" | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Total uncompressed: $([math]::Round($size))MB"
          if ($size -gt 3000) {
            Write-Host "::warning::Bundle is $([math]::Round($size))MB uncompressed - ZIP may exceed 2GB"
          }

      # ========== Create Archive ==========
      - name: Create ZIP archive (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist-bundle/Qubes" -DestinationPath "${{ matrix.artifact_name }}.zip"

      - name: Create ZIP archive (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          cd dist-bundle
          zip -r "../${{ matrix.artifact_name }}.zip" Qubes

      # ========== Create Heavy Update Archive ==========
      # Contains only frontend binary + backend (no models/ollama) for in-app updates
      - name: Create heavy update archive (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $updateDir = "update-staging"
          New-Item -ItemType Directory -Force -Path $updateDir
          Copy-Item "dist-bundle/Qubes/Qubes.exe" "$updateDir/Qubes.exe"
          Copy-Item "dist-bundle/Qubes/qubes-backend" "$updateDir/qubes-backend" -Recurse
          Copy-Item "dist-bundle/Qubes/covenant" "$updateDir/covenant" -Recurse
          Copy-Item "dist-bundle/Qubes/node" "$updateDir/node" -Recurse
          tar -czf "Qubes-Update-Windows.tar.gz" -C $updateDir .
          $hash = (Get-FileHash "Qubes-Update-Windows.tar.gz" -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item "Qubes-Update-Windows.tar.gz").Length
          Write-Host "Update archive: size=${size}, sha256=${hash}"
          echo "UPDATE_SHA256=$hash" >> $env:GITHUB_ENV
          echo "UPDATE_SIZE=$size" >> $env:GITHUB_ENV

      - name: Create heavy update archive (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          UPDATE_DIR="update-staging"
          mkdir -p "$UPDATE_DIR"
          # macOS: backend is inside .app, so include the whole .app
          cp -r "dist-bundle/Qubes/Qubes.app" "$UPDATE_DIR/Qubes.app"
          # Remove models and ollama from inside .app to keep update small
          rm -rf "$UPDATE_DIR/Qubes.app/Contents/MacOS/models" 2>/dev/null || true
          rm -rf "$UPDATE_DIR/Qubes.app/Contents/MacOS/ollama" 2>/dev/null || true
          tar -czf "Qubes-Update-macOS.tar.gz" -C "$UPDATE_DIR" .
          HASH=$(sha256sum "Qubes-Update-macOS.tar.gz" | cut -d' ' -f1)
          SIZE=$(stat -c%s "Qubes-Update-macOS.tar.gz" 2>/dev/null || stat -f%z "Qubes-Update-macOS.tar.gz")
          echo "Update archive: size=${SIZE}, sha256=${HASH}"
          echo "UPDATE_SHA256=$HASH" >> $GITHUB_ENV
          echo "UPDATE_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Create heavy update archive (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          UPDATE_DIR="update-staging"
          mkdir -p "$UPDATE_DIR"
          cp "dist-bundle/Qubes/Qubes" "$UPDATE_DIR/Qubes"
          cp -r "dist-bundle/Qubes/qubes-backend" "$UPDATE_DIR/qubes-backend"
          cp -r "dist-bundle/Qubes/covenant" "$UPDATE_DIR/covenant"
          cp -r "dist-bundle/Qubes/node" "$UPDATE_DIR/node"
          tar -czf "Qubes-Update-Linux.tar.gz" -C "$UPDATE_DIR" .
          HASH=$(sha256sum "Qubes-Update-Linux.tar.gz" | cut -d' ' -f1)
          SIZE=$(stat -c%s "Qubes-Update-Linux.tar.gz")
          echo "Update archive: size=${SIZE}, sha256=${HASH}"
          echo "UPDATE_SHA256=$HASH" >> $GITHUB_ENV
          echo "UPDATE_SIZE=$SIZE" >> $GITHUB_ENV

      # ========== Upload ZIP to Release ==========
      - name: Upload ZIP to Release
        if: needs.create-release.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.create-release.outputs.tag }}" "${{ matrix.artifact_name }}.zip" --clobber

      - name: Upload update archive to Release
        if: needs.create-release.result == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Upload the heavy update archive
          if [ -f "Qubes-Update-Windows.tar.gz" ]; then
            gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-Update-Windows.tar.gz" --clobber
          fi
          if [ -f "Qubes-Update-macOS.tar.gz" ]; then
            gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-Update-macOS.tar.gz" --clobber
          fi
          if [ -f "Qubes-Update-Linux.tar.gz" ]; then
            gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-Update-Linux.tar.gz" --clobber
          fi
          # Save SHA-256 and size as a metadata file for the updater-manifest job
          echo "${UPDATE_SHA256}" > "update-sha256-${{ matrix.platform }}.txt"
          echo "${UPDATE_SIZE}" > "update-size-${{ matrix.platform }}.txt"
          gh release upload "${{ needs.create-release.outputs.tag }}" "update-sha256-${{ matrix.platform }}.txt" --clobber
          gh release upload "${{ needs.create-release.outputs.tag }}" "update-size-${{ matrix.platform }}.txt" --clobber

      # ========== Upload Tauri Updater Assets ==========
      - name: Upload Windows updater assets
        if: needs.create-release.result == 'success' && matrix.platform == 'windows-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $nsisDir = "qubes-gui/src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          $files = Get-ChildItem -Path $nsisDir -Filter "*.exe" | Select-Object -First 1
          if ($files) {
            $exe = $files.FullName
            $sig = "$exe.sig"
            # Rename for consistent naming
            Copy-Item $exe "Qubes-Windows-setup.exe"
            if (Test-Path $sig) {
              Copy-Item $sig "Qubes-Windows-setup.exe.sig"
              gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-Windows-setup.exe.sig" --clobber
            }
            gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-Windows-setup.exe" --clobber
          }

      - name: Upload macOS updater assets
        if: needs.create-release.result == 'success' && startsWith(matrix.platform, 'macos')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="qubes-gui/src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          # Use Tauri's generated tar.gz + sig (signature matches the archive)
          TARGZ=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$TARGZ" ] && [ -f "$TARGZ" ]; then
            cp "$TARGZ" "Qubes-macOS-ARM.app.tar.gz"
            gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-macOS-ARM.app.tar.gz" --clobber
            if [ -f "$TARGZ.sig" ]; then
              cp "$TARGZ.sig" "Qubes-macOS-ARM.app.tar.gz.sig"
              gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-macOS-ARM.app.tar.gz.sig" --clobber
            fi
          fi

      - name: Upload Linux updater assets
        if: needs.create-release.result == 'success' && matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE_DIR="qubes-gui/src-tauri/target/${{ matrix.target }}/release/bundle/appimage"
          # Use Tauri's generated tar.gz + sig (signature matches the archive)
          TARGZ=$(find "$APPIMAGE_DIR" -name "*.AppImage.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$TARGZ" ] && [ -f "$TARGZ" ]; then
            cp "$TARGZ" "Qubes-Linux.AppImage.tar.gz"
            gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-Linux.AppImage.tar.gz" --clobber
            if [ -f "$TARGZ.sig" ]; then
              cp "$TARGZ.sig" "Qubes-Linux.AppImage.tar.gz.sig"
              gh release upload "${{ needs.create-release.outputs.tag }}" "Qubes-Linux.AppImage.tar.gz.sig" --clobber
            fi
          fi

  # ========== Generate Updater Manifest ==========
  updater-manifest:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: needs.create-release.result == 'success'

    steps:
      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          VERSION="${TAG#v}"
          REPO="BitFaced2/Qubes"
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Download signatures if they exist
          WIN_SIG=""
          MAC_SIG=""
          LINUX_SIG=""

          # Try to get Windows signature
          if gh release download "$TAG" --repo "$REPO" --pattern "Qubes-Windows-setup.exe.sig" 2>/dev/null; then
            WIN_SIG=$(cat Qubes-Windows-setup.exe.sig)
          fi

          # Try to get macOS signature
          if gh release download "$TAG" --repo "$REPO" --pattern "Qubes-macOS-ARM.app.tar.gz.sig" 2>/dev/null; then
            MAC_SIG=$(cat Qubes-macOS-ARM.app.tar.gz.sig)
          fi

          # Try to get Linux signature
          if gh release download "$TAG" --repo "$REPO" --pattern "Qubes-Linux.AppImage.tar.gz.sig" 2>/dev/null; then
            LINUX_SIG=$(cat Qubes-Linux.AppImage.tar.gz.sig)
          fi

          # Download heavy update metadata (SHA-256 and size per platform)
          WIN_UPDATE_SHA=""
          WIN_UPDATE_SIZE="0"
          MAC_UPDATE_SHA=""
          MAC_UPDATE_SIZE="0"
          LINUX_UPDATE_SHA=""
          LINUX_UPDATE_SIZE="0"

          if gh release download "$TAG" --repo "$REPO" --pattern "update-sha256-windows-latest.txt" 2>/dev/null; then
            WIN_UPDATE_SHA=$(cat update-sha256-windows-latest.txt)
          fi
          if gh release download "$TAG" --repo "$REPO" --pattern "update-size-windows-latest.txt" 2>/dev/null; then
            WIN_UPDATE_SIZE=$(cat update-size-windows-latest.txt)
          fi
          if gh release download "$TAG" --repo "$REPO" --pattern "update-sha256-macos-latest.txt" 2>/dev/null; then
            MAC_UPDATE_SHA=$(cat update-sha256-macos-latest.txt)
          fi
          if gh release download "$TAG" --repo "$REPO" --pattern "update-size-macos-latest.txt" 2>/dev/null; then
            MAC_UPDATE_SIZE=$(cat update-size-macos-latest.txt)
          fi
          if gh release download "$TAG" --repo "$REPO" --pattern "update-sha256-ubuntu-22.04.txt" 2>/dev/null; then
            LINUX_UPDATE_SHA=$(cat update-sha256-ubuntu-22.04.txt)
          fi
          if gh release download "$TAG" --repo "$REPO" --pattern "update-size-ubuntu-22.04.txt" 2>/dev/null; then
            LINUX_UPDATE_SIZE=$(cat update-size-ubuntu-22.04.txt)
          fi

          # Create latest.json with both Tauri updater and heavy update sections
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "Qubes $TAG release",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "$BASE_URL/Qubes-Windows-setup.exe"
              },
              "darwin-aarch64": {
                "signature": "$MAC_SIG",
                "url": "$BASE_URL/Qubes-macOS-ARM.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "$BASE_URL/Qubes-Linux.AppImage.tar.gz"
              }
            },
            "heavy_update": {
              "version": "$VERSION",
              "windows-x86_64": {
                "url": "$BASE_URL/Qubes-Update-Windows.tar.gz",
                "sha256": "$WIN_UPDATE_SHA",
                "size": $WIN_UPDATE_SIZE
              },
              "darwin-aarch64": {
                "url": "$BASE_URL/Qubes-Update-macOS.tar.gz",
                "sha256": "$MAC_UPDATE_SHA",
                "size": $MAC_UPDATE_SIZE
              },
              "linux-x86_64": {
                "url": "$BASE_URL/Qubes-Update-Linux.tar.gz",
                "sha256": "$LINUX_UPDATE_SHA",
                "size": $LINUX_UPDATE_SIZE
              }
            }
          }
          EOF

          cat latest.json
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
