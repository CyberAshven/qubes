# Logging Configuration for Qubes

# Global log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_level: INFO

# Console output configuration
console:
  enabled: true
  format: human  # Options: human, json

# File output configuration
file:
  enabled: true
  path: logs/qubes.log
  max_bytes: 10485760  # 10 MB
  backup_count: 5
  format: json  # Options: human, json

# Log rotation
rotation:
  when: midnight  # Rotate at midnight
  interval: 1     # Every 1 day
  backup_count: 30  # Keep 30 days of logs

# Component-specific log levels (override global)
components:
  core: INFO
  crypto: WARNING
  storage: INFO
  ai: INFO
  p2p: INFO
  blockchain: INFO
  monitoring: WARNING

# Sensitive data redaction
redaction:
  enabled: true
  keys:
    - private_key
    - secret_key
    - api_key
    - password
    - token
    - wif
    - mnemonic
