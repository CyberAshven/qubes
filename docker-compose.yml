# Docker Compose for Qubes Development Environment
# Includes Qubes orchestrator, Prometheus, and Grafana

version: '3.8'

services:
  # Qubes Orchestrator
  qubes:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: qubes-orchestrator
    ports:
      - "8080:8080"  # Health check API
    volumes:
      - ./:/app  # Mount code for hot reload
      - qubes-data:/app/data  # Persist Qube data
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    env_file:
      - .env  # Load API keys from .env file
    networks:
      - qubes-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: qubes-prometheus
    ports:
      - "9090:9090"  # Prometheus UI
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - qubes-network
    restart: unless-stopped

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: qubes-grafana
    ports:
      - "3000:3000"  # Grafana UI
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - qubes-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  qubes-network:
    driver: bridge

volumes:
  qubes-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
