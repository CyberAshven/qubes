<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qubes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            gap: 32px;
            padding: 24px;
        }

        .logo {
            max-width: 420px;
            max-height: 260px;
            width: auto;
            height: auto;
            object-fit: contain;
            animation: logoFloat 3s ease-in-out infinite, fadeIn 0.8s ease-out;
        }

        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .chain {
            display: flex;
            align-items: center;
            height: 36px;
        }

        .block {
            width: 28px;
            height: 28px;
            background: rgba(167, 139, 250, 0.15);
            border: 2px solid #a78bfa;
            border-radius: 4px;
            opacity: 0;
            animation: blockAppear 2.4s ease-in-out infinite;
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.3);
        }

        .link {
            width: 14px;
            height: 2px;
            background: linear-gradient(90deg, #a78bfa, #06b6d4);
            opacity: 0;
            animation: linkAppear 2.4s ease-in-out infinite;
        }

        .block:nth-child(1) { animation-delay: 0s; }
        .link:nth-child(2) { animation-delay: 0.2s; }
        .block:nth-child(3) { animation-delay: 0.4s; }
        .link:nth-child(4) { animation-delay: 0.6s; }
        .block:nth-child(5) { animation-delay: 0.8s; }
        .link:nth-child(6) { animation-delay: 1.0s; }
        .block:nth-child(7) { animation-delay: 1.2s; }

        .text {
            color: rgba(167, 139, 250, 0.85);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes blockAppear {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            20%, 80% { opacity: 1; transform: scale(1); }
        }

        @keyframes linkAppear {
            0%, 100% { opacity: 0; transform: scaleX(0); }
            25%, 75% { opacity: 1; transform: scaleX(1); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="splash">
        <img src="/qubes_banner.png" alt="Qubes" class="logo" />
        <div class="loader">
            <div class="chain">
                <div class="block"></div>
                <div class="link"></div>
                <div class="block"></div>
                <div class="link"></div>
                <div class="block"></div>
                <div class="link"></div>
                <div class="block"></div>
            </div>
            <div class="text">Building Memory Chain</div>
        </div>
    </div>
</body>
</html>
